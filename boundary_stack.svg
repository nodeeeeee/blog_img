<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760">
  <defs>
    <style>
      .title{font:700 30px Arial, sans-serif;fill:#17202a}
      .sub{font:400 17px Arial, sans-serif;fill:#34495e}
      .layer{fill:#f8fafc;stroke:#25364a;stroke-width:2}
      .hot{fill:#fff3cd;stroke:#b7791f;stroke-width:2}
      .paper{font:700 18px Arial, sans-serif;fill:#102a43}
      .txt{font:400 15px Arial, sans-serif;fill:#243b53}
      .arrow{stroke:#334e68;stroke-width:3;marker-end:url(#arrow)}
      .bad{stroke:#c0392b;stroke-width:3;stroke-dasharray:9 7}
      .good{stroke:#168a62;stroke-width:4;marker-end:url(#arrow2)}
      .label{font:700 15px Arial, sans-serif;fill:#7b241c}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334e68"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#168a62"/>
    </marker>
  </defs>
  <text x="50" y="55" class="title">一个统一问题：kernel 边界阻断 fusion 与 overlap</text>
  <text x="50" y="88" class="sub">这些论文的区别不是“问题不同”，而是每篇选择移动不同层级的边界。</text>

  <rect x="55" y="130" width="245" height="92" rx="8" class="layer"/>
  <text x="78" y="162" class="paper">单算子 / tile 边界</text>
  <text x="78" y="190" class="txt">tile shape、transaction、bank、</text>
  <text x="78" y="212" class="txt">register 决定一个 kernel 是否高效</text>

  <rect x="340" y="130" width="245" height="92" rx="8" class="layer"/>
  <text x="363" y="162" class="paper">load-compute 时间边界</text>
  <text x="363" y="190" class="txt">copy 与 compute 串行，TMA/</text>
  <text x="363" y="212" class="txt">TensorCore 无法充分重叠</text>

  <rect x="625" y="130" width="245" height="92" rx="8" class="layer"/>
  <text x="648" y="162" class="paper">算子 / 子图边界</text>
  <text x="648" y="190" class="txt">中间结果反复落 DRAM，</text>
  <text x="648" y="212" class="txt">小 kernel launch 太多</text>

  <rect x="910" y="130" width="245" height="92" rx="8" class="layer"/>
  <text x="933" y="162" class="paper">模型 iteration 边界</text>
  <text x="933" y="190" class="txt">operator-per-kernel barrier</text>
  <text x="933" y="212" class="txt">阻断跨层流水与通信重叠</text>

  <line x1="300" y1="176" x2="340" y2="176" class="arrow"/>
  <line x1="585" y1="176" x2="625" y2="176" class="arrow"/>
  <line x1="870" y1="176" x2="910" y2="176" class="arrow"/>

  <line x1="180" y1="265" x2="1030" y2="265" class="bad"/>
  <text x="380" y="252" class="label">边界越多，越难做跨边界 reuse / fusion / overlap</text>

  <rect x="70" y="310" width="230" height="86" rx="8" class="hot"/>
  <text x="92" y="342" class="paper">ROLLER</text>
  <text x="92" y="370" class="txt">把单算子搜索变成</text>
  <text x="92" y="392" class="txt">硬件对齐 rTile 构造</text>

  <rect x="335" y="310" width="230" height="86" rx="8" class="hot"/>
  <text x="357" y="342" class="paper">ALCOP / PipeThreader</text>
  <text x="357" y="370" class="txt">把 load、mma、reduce</text>
  <text x="357" y="392" class="txt">显式 pipeline 化</text>

  <rect x="600" y="310" width="230" height="86" rx="8" class="hot"/>
  <text x="622" y="342" class="paper">AStitch / WELDER</text>
  <text x="622" y="370" class="txt">把 memory-intensive 子图</text>
  <text x="622" y="392" class="txt">融合为 tile/dataflow 问题</text>

  <rect x="865" y="310" width="230" height="86" rx="8" class="hot"/>
  <text x="887" y="342" class="paper">MPK</text>
  <text x="887" y="370" class="txt">把整个 inference iteration</text>
  <text x="887" y="392" class="txt">放进 persistent kernel</text>

  <rect x="335" y="455" width="230" height="86" rx="8" class="hot"/>
  <text x="357" y="487" class="paper">LADDER</text>
  <text x="357" y="515" class="txt">把 dtype/layout 转换边界</text>
  <text x="357" y="537" class="txt">纳入 tile transformation</text>

  <rect x="600" y="455" width="230" height="86" rx="8" class="hot"/>
  <text x="622" y="487" class="paper">TileLang</text>
  <text x="622" y="515" class="txt">用 FTG 把可编程控制面</text>
  <text x="622" y="537" class="txt">与自动推理接起来</text>

  <line x1="185" y1="396" x2="185" y2="590" class="good"/>
  <line x1="450" y1="541" x2="450" y2="590" class="good"/>
  <line x1="715" y1="541" x2="715" y2="590" class="good"/>
  <line x1="980" y1="396" x2="980" y2="590" class="good"/>

  <rect x="70" y="610" width="1025" height="76" rx="10" fill="#e8f6f3" stroke="#168a62" stroke-width="2"/>
  <text x="95" y="643" class="paper">共同目标</text>
  <text x="205" y="643" class="txt">把原先被 kernel、operator、dtype、hardware unit、runtime 分割开的执行片段，重新变成一个可分析、可调度、可融合的数据流。</text>
  <text x="205" y="670" class="txt">区别只在于：每篇论文选择在哪个层级上移动边界，以及它愿意承担多少可编程性、动态性和工程复杂度。</text>
</svg>
